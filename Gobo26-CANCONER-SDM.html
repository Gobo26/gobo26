        .btn-index:hover{background:#eff6ff;}

        footer a:hover{opacity:.8;}

<script>
    function anarACanco(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
    function anarAIndex(){const el=document.getElementById('indexContainer');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});else window.scrollTo({top:0,behavior:'smooth'});}
    const songs=[
        {title:"El canó de Palamós",author:"Josep Lluís Ortega Monasterio",lyrics:`El canó de Palamós,\nben mirat que n'és d'hermós,\nja fa temps que està callat,\nja fa temps que mira el mar\namb el ventre rovellat,\nquatre rodes i un forat.\n\nDe la boca del canó,\nnomés surten els records\nde les guerres d'aquell temps,\nquan la gent de l'Empordà,\nde la Selva i del Vallès\nes mataven per no res.\n\nEscolteu la seva veu,\noh, canons de tot el món\ni la gent de tot arreu,\nno més guerres ni més morts,\nno més bombes ni més foc,\nsóc el canó de Palamós.`},
        {title:"El capità",author:"Carles Casanovas / Antoni Mas",lyrics:`Quan naveguis de bolina,\nsota el grop orsant la nau.\nQuan la boira sigui espessa\ni el redós quedi llunyà.\n\nQuan terregis entre lloses,\nperquè el vent és massa fort.\nQuan el cel no té resposta,\nllavors sabràs el que costa\nmenar la nau fins a port.\n\nQue senzill ser capità\nquan el vent bufa de popa,\nquan no hi ha esculls a tocar,\nquan la pesca és generosa.\nQue senzill ser capità\nsota estrelles i a coberta,\ntot singlant per mar oberta\ni amb la lluna de costat.\n\nQuan el far no et sigui guia\nperquè no volen els déus.\nQuan l'onada trenqui a sobre,\nquan et costi estar dempeus.\nQuan la mar brami gelosa\ni tremoli tot el casc,\nquan la força et sigui escassa,\nllavors sabràs quina traça\nli cal a un bon capità.\n\nQuan la mar dorm encalmada,\nquan Neptú fa migdiada,\njo també sóc capità.`},
        {title:"El meu avi",author:"J.L. Ortega Monasterio",lyrics:`El meu avi va anar a Cuba\na bordo del "Catalán",\nel millor barco de guerra\nde la flota d'Ultramar.\nEl timoner i el nostramo\ni catorze mariners\neren nascuts a Calella,\neren nascuts a Palafrugell...\n\nQuan el "Catalán" sortia a la mar,\nels nois de Calella feien un cremat,\nmans a la guitarra, solien cantar, solien cantar:\nVisca Catalunya! Visca el "Catalán"!...\n\nArribaren temps de guerres,\nde perfídies i traïcions\nen el mar de les Antilles\nretronaren els canons.\nI el mariners de Calella,\nel meu avi enmig de tots,\nvaren morir a coberta,\nvaren morir al peu del canó!\n\nQuan el "Catalán" sortia a la mar,\ncridava el meu avi: apa nois que és tard!\nperò els valents de bordo\nno varen tornar, no varen tornar\ntingueren la culpa els americans...`},
        {title:"La balada d'en Lucas",author:"J.L. Ortega-Monasterio",lyrics:`Jo tenia una caseta vora el mar,\njo tenia un jardí florit i un cel de pau,\njo tenia una barca i unes xarxes a la platja\ni una dolça matinada al despertar.\n\nQuan vingueren gent de fora, gent del nord,\ngent estranya que jugaven amb l'amor,\njo vaig perdre l'alegria i la pau de cada dia\ni la cala que era el meu món.\n\nAra hi penso, dia i nit,\nen el meu jardí florit\ni en la mare que esperava el meu retorn.\nI amb la cala solitària\nquan el so d'una guitarra\nhi portava una cançó.\n\nFins l'aroma dels meus pins\ni les flors del meu jardí,\ntot ho tinc jugat i tot ho tinc perdut.\nJa no em queda ni la vela\nde la barca marinera\nni la cala que era el meu món.`},
        {title:"La bella Lola",author:"Popular",lyrics:`Después de un año de no ver tierra,\nporque la guerra me lo impidió,\nme fui al puerto donde se hallaba\nla que adoraba mi corazón...\n\nCuando en la playa la bella Lola,\nsu larga cola luciendo va,\nlos marineros se vuelven locos\ny hasta el piloto pierde el compás.\n\n¡Ay! que placer, sentía yo,\ncuando en la playa sacó el pañuelo\ny me saludó, pero después, llegó hacia mí,\nme dio un abrazo y en aquel lazo creí morir...\n\nLa cubanita lloraba triste,\nde verse sola y en alta mar,\ny el marinero la consolaba:\nno llores Lola, no llores más.`},
        {title:"La caña dulce",author:"Popular",lyrics:`Estando yo una mañana,\ntriste y llorosa, mirando al mar,\nme encontré con una mulata\nque me mostraba su delantal,\nme encontré con una mulata\nque me mostraba su delantal.\n\nYo la miraba, yo la miraba y me sonreía\nY al mismo tiempo y al mismo tiempo yo le decía\nSal mulatita, salte del mar\nQue a mi me gusta que a mi me encanta\nque a mi me gusta tu delantal.\n\nSus ojos eran azules\ncomo las olas del mar de amor,\ny su cinturita curvada\ncomo la caña del pescador,\ny su cinturita curvada\ncomo la caña del pescador.\n\nQuiéreme niña, quiéreme niña, quiéreme siempre.\nQuiéreme tanto, quiéreme tanto, como te quiero,\ny, a cambio de eso, yo te daré:\nLa caña dulce, la dulce caña, la caña dulce y el buen café.\nLa caña dulce, la dulce caña, la caña dulce y el buen café.`},
        {title:"La gavina",author:"Frederic Sirés",lyrics:`Oh, gavina voladora\nque voleies sobre el mar,\ni al pas del vent, mar enfora,\nvas volant fins arribar\na la platja assolellada,\nplatja de dolços records,\non dia i nit hi fa estada\nla nina dels meus amors.\n\nQuan la vegis sola,\nprop de la quieta onada,\ndona-li la besada\nque li envio més fervent.\nDigues-li que sento\ndolça melangia\ni que penso en ella\nen tot moment.\n\nOh! Si igual que tu, gavina,\nel mar pogués jo travessar\nfins arribar a la platja,\non tan dolç és recordar\ni veure la imatge bruna\nen un suau despertar\nde la nina que entre somnis\nés tan grat acariciar.`},
        {title:"La Paloma",author:"Sebastián Iradier",lyrics:`Cuando salí de La Habana\nválgame Dios,\nuna linda guachinanga que en mí volvió.\nCuando salí de La Habana, válgame Dios,\nnadie supo mi tristeza si no fui yo.\n\nSi a tu ventana llega una paloma,\ntrátala con cariño que es mi persona.\nCuéntale mis amores, bien de mi vida,\ncorónala de flores que es cosa mía.\n\nAy! chinita que sí, Ay! que dame tu amor,\nAy! que vente conmigo, chinita,\na donde vivo yo. (bis)`},
        {title:"La puntaire",author:"Joan Badosa / J.M. Bello",lyrics:`És la terra més galana que en el món hi ha\nCatalunya de la plana fins a l'Empordà.\nUn paradís em semblen ses conreus\ndes de l'Ebre als Pirineus.\n\nUn dia els àngels del cel es van voler alegrar\ni fent rotllo una sardana varen puntejar,\ni en veure'ls va dir nostre Senyor\neixa és la dansa de bell amor.\n\nI buscant una terra noble on poder-la fer ballar\nen el cor del nostre poble per sempre la va deixar.\nI el ressò d'aquesta sardana li farà saber a tothom\nque la terra catalana és la millor que hi ha el món.\n\nAu doncs fills de Catalunya, doneu-vos les mans;\ni ben units com a germans,\ntant en temps de pau com en la guerra,\ndes del mar fins a la serra enlairem els nostres cants.\n\nI si algú com l'estranger francès va voler ahir\nles nostres llars vol envair,\nel rebrem ardits amb to de guerra\ni sabrà que aquesta terra defensem fins a morir.`},
        {title:"Lola la tavernera",author:"Carles Casanovas / Josep Bastons",lyrics:`Ja de negra nit buscant aixopluc entra a la taverna\nEl vent i la pluja van malmenant dies de tardor\nMariner jove, tibat i fort,\namb fulard negre lligat al coll,\nalt, roda-soques, perdonavides i adulador.\n\nCorre Lola posa'm un got de vi\ni et canto tota la nit.\n\nI mentre ell l'hi canta una havanera amb la guitarra,\nella mou el cul, balanceja els pits, xiscla una rialla.\nI mirant coqueta pica l'ullet al noi de Calella,\ngronxolant el cos, marcant el compàs d'aquella havanera.\n\nEl teu cos m'encén, el teu cos em pot, mulateta bella.\nJo t'estimaré fins la fi dels temps si tu vols ser meva.\n\nI la bella Lola, llença el davantal,\nmans a la cintura balla amb soltesa pel seu amant.\nI com cada vespre la tavernera encisadora,\nespera el galàn que com cada nit l'ha d'enamorar\namb la guitarra i un got de vi\ncantarà alegre tota la nit\ncançons de Cuba, cants de mulates i blau marí.`},
        {title:"Mare, vull ser pescador",author:"Antònia Vilàs",lyrics:`A un poble de pescadors, entre el mar i la muntanya,\nuna mare al seu fill, li inculcà que fora frare.\nA dalt d'un vell monestir, un jove amb hàbits de frare,\ntot contemplant el blau mar, tot contemplant el blau mar\naixí a sa mare li parla...\n\nMare, vull ser pescador, no m'ho privis dolça mare,\nja sé amb quanta buidor et deixà la mort del pare.\nMare, vull ser pescador, vull ser pescador i no frare,\nque soc fill de pescador, i malgrat el teu dolor\njo tinc les venes salades.\n\nMare, vull fer-me a la mar; mare, vull fer-me a la mar,\ni que em bressin les onades.`},
        {title:"Mariner de terra endins",author:"Narcisa Oliver / Josep Bastons",lyrics:`Vaig conèixer un vell pastor\nque ses ovelles menava;\ncada jorn de sol a sol,\namb sa flauta acompanyant,\neixa tonada cantava,\neixa tonada cantava:\n\nCom serà el mar?\nSerà blau i gran com diuen?\nSerà veritat\nque de nit és com la plata?\nTothom qui el veu\nes queda ple d'enyorança...\nDigue'm tu, sol,\nque vens d'una altra contrada:\nhas vist el mar?\n\nTota ma vida he viscut\naquí, del pla a la muntanya.\nI fer diners no he pogut\nper veure la costa llunyana.\nSé que hi ha un Mediterrà\nque en té l'encís de donzella.\nSé que hi ha barcos de vela,\nsé qui ha mar a Calella,\non les ones van i venen,\nal compàs de l'havanera.\nPerò jo mai no he vist el mar.`},
        {title:"Mi madre fué una mulata",author:"Popular",lyrics:`Mi madre fue una mulata,\ny mi padre un federal,\nyo teniente de una fragata,\nque va y viene para ultramar.\n\nCada vez que me veo, rodeado de mar,\ncojo mi guitarra y me pongo a cantar,\npregunto a mis penas, quién pudiera hallar\nel rostro divino, que un pobre marino,\nno pudo alcanzar.\n\nMil veces busqué la suerte,\nsobre las olas del mar,\nmil veces quise la muerte,\ny no la pude encontrar.\n\nNo llores mi vida,\nno llores mi amor,\nmira que las lágrimas,\nme causan dolor.\nSi lloras la ausencia,\ndel bien que te amo,\nllora vida mía, llora vida mía,\ntambién lloro yo.`},
        {title:"No véis allí?",author:"Popular",lyrics:`¿No veis allí,\nen aquella buhardilla?\nEn la ventana, una rama sin flor.\n¿No veis allí, entre flores, cual brilla\nun ángel bello, y de puro candor.\n\nEs el jardín de la bella artesana\nque, sin soñar en la ambición,\nprefiere huir de la pompa mundana.\nVivir en paz con Dios, vivir en paz, vivir. (bis)`},
        {title:"Paraules d'amor",author:"J.M. Serrat",lyrics:`Ella em va estimar tant...\nJo me l'estimo encara.\nPlegats vam travessar\nuna porta tancada.\nElla, com us ho podré dir,\nera tot el meu món, llavors\nquan en la llar cremaven\nnomés paraules d'amor...\n\nParaules d'amor senzilles i tendres.\nNo en sabíem més, teníem quinze anys.\nNo havíem tingut massa temps per aprendre'n,\ntot just despertàvem del son dels infants.\nEn teníem prou amb tres frases fetes\nque havíem après d'antics comediants.\nD'històries d'amor, somnis de poetes,\nno en sabíem més, teníem quinze anys...\n\nElla qui sap on és,\nella qui sap on para.\nLa vaig perdre i mai més\nhe tornat a trobar-la.\nPerò sovint en fer-se fosc,\nde lluny m'arriba una cançó.\nVelles notes, vells acords,\nvelles paraules d'amor...\n\nParaules d'amor senzilles i tendres.\nNo en sabíem més, teníem quinze anys.\nNo havíem tingut massa temps per aprendre'n,\ntot just despertàvem del son dels infants.\nEn teníem prou amb tres frases fetes\nque havíem après d'antics comediants.\nD'històries d'amor, somnis de poetes,\nno en sabíem més, teníem quinze anys...`},
        {title:"Salió de Jamaica",author:"Popular",lyrics:`Salió de Jamaica rumbo a Nueva York\nUn barco velero cargado de ron\nEn medio del mar el barco se hundió\nLa culpa la tuvo el señor capitán\nQue se emborrachó.\n\nNo siento el barco\nQue se perdió\nSiento el marino\nY la tripulación\nPobres marinos\nPobres pedazos\nDe corazón\nQue la mar brava\nSe los llevó.\n\nSeñor capitán\nDéjeme subir\nA izar la bandera\nDel palo más alto\nDe su bergantín\nQue quiero mirar\nDel palo mayor\nSi en el puerto se halla\nEsperando mi amor.`},
        {title:"Ulls verds",author:"Josep Servià i Figa / Ricard Viladesau",lyrics:`Voldria ser poeta per dir-te quant t'estimo\nPer convertir tes llàgrimes en versos i en cançons\nPer prendre i oferir-te els boscos, les estrelles\nLes ones i les coses mes belles d'aquest mon.\n\nUlls verds de mirada tendra que no puc aconseguir\nQui pugues els teus ulls prendre i tot mirant-los morir.\n\nVoldria ser la mar de la cala on et banyes\nI el blanc llençol de seda que embolcalla el teu cos\nI el mirall que als matins el teu rostre emmiralla\nI fer-te la companya del meu dolç llit d'amor.`},
        {title:"Vell pescador",author:"J.Pujol (Llibori)",lyrics:`Vell pescador que se'n va anar\na viure molt lluny del seu mar,\nsentat al sol d'un vell carrer,\ncantava un vell vals mariner.\n\nTenia barca, tenia rems,\ntenia molta força a les mans\nper anar a pescar, amb il·lusió\ni veure el sol sortir a l'horitzó.\n\nI, tot de cop, se li acostà un infant:\n"Digues-me tú, que hi has estat,\ncom és aquell el teu mar?"\n\nEl mar és bó, el mar és blau,\nel mar és calma, i és temporal.\nEl mar és bó, el mar és blau,\nel mar és calma, i és temporal.\n\nI si Déu vol, petit infant,\nun jorn hi tornaré,\nmenjant la pols d'un vell camí,\nsempre mirant a l'est.\nMirant el blau on vaig passar tants anys.\nM'enyoraré o ploraré,\no potser cantaré\nEl mar és bó, el mar és blau,\nel mar és calma, i és temporal.\nEl mar és bó, el mar és blau,\nel mar és calma, i és temporal.`},
        {title:"Vestida de nit",author:"Glòria Cruz / Càstor Pérez",lyrics:`Pinto les notes d'una havanera,\nblava com l'aigua d'un mar antic;\nblanca d'escuma, dolça com l'aire...\ngris de gavina, daurada d'imatges, vestida de nit.\n\nMiro el paisatge\ncerco paraules,\nque omplin els versos\nsense neguit;\nels pins em parlen,\nsento com callen,\nel vent s'emporta...\ntot l'horitzó.\n\nSi pogués fer-me escata....\ni amagar-me a la platja,\nper sentir sons i tardes del passat....\nd'aquell món d'enyorança, amor i calma,\nperfumat de lluna, foc i rom.\n\nSi pogués enfilar-me...\na l'onada més alta, i guarnir de palmeres el record...\nescampant amb canyella totes les cales i,\namb petxines, fer-lis un bressol.\n\nEls vells em parlen plens de tendresa,\nd'hores viscudes amb emoció;\njoves encara, forts i valents,\nprinceps de xarxa, herois de tempesta,\namics del bon temps.\n\nEls ulls inventen\nnoves històries\nvaixells que tornen\nd'un lloc de sol;\nporten tonades\nenamorades,\ndones i Pàtria...\nveles i flors.`},
    ];
    const songsContainer=document.getElementById('songsContainer');
    const songIndex=document.getElementById('songIndex');
    const searchInput=document.getElementById('searchInput');
    const noResults=document.getElementById('noResults');
    function norm(t){return t.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();}
    function render(f=""){
        songsContainer.innerHTML="";songIndex.innerHTML="";
        const nf=norm(f);let ok=false;
        songs.forEach((s,i)=>{
            if(!norm(s.title).includes(nf)&&!norm(s.lyrics).includes(nf))return;
            ok=true;
            const a=document.createElement('a');a.href='#';a.className='index-link';a.textContent=s.title;
            a.onclick=e=>{e.preventDefault();anarACanco('song-'+i);};songIndex.appendChild(a);
            const c=document.createElement('article');c.id='song-'+i;c.className='song-card';
            c.innerHTML=`<div class="song-header"><div><div class="song-title">${s.title}</div><div class="song-author">${s.author}</div></div><a href="#" class="btn-index" onclick="anarAIndex();return false;">↑ Índex</a></div><div class="song-body"><div class="lyrics">${s.lyrics}</div></div>`;
            songsContainer.appendChild(c);
        });
        noResults.style.display=ok?'none':'block';
    }
    searchInput.addEventListener('input',e=>render(e.target.value));
    render();
</script>
</body>
</html>
