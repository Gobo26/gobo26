<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Gobo26 - Sudoku</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #f1f5f9;
            --board-bg:   #ffffff;
            --text:       #334155;
            --text-fixed: #1e293b;
            --text-user:  #2563eb;
            --text-error: #dc2626;
            --line-thin:  #94a3b8;
            --line-thick: #475569;
            --cell-hover: #e2e8f0;
            --cell-sel:   #bfdbfe;
            --cell-fixed: #f8fafc;
            --cell-error: #fee2e2;
            --cell-same:  #dbeafe;
            --cell-notes: #f0fdf4;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header { width:100%; background:#1e293b; border-bottom:1px solid #334155;
                 padding:10px 16px; display:flex; align-items:center;
                 justify-content:space-between; position:sticky; top:0; z-index:50; flex-shrink:0; }
        .logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
        .logo-txt { font-size:.9rem; font-weight:900; color:white; letter-spacing:-.5px; }
        .logo-txt span { color:#3b82f6; }
        .hdr-title { font-size:.95rem; font-weight:700; color:white; letter-spacing:.5px; }

        /* TIMER */
        #timer-display {
            font-size: 1rem;
            font-weight: 800;
            color: #93c5fd;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            min-width: 58px;
            text-align: right;
        }

        /* MAIN: ocupa tot l'espai restant */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            overflow: hidden;
            gap: 4px;
        }

        /* BOTONS DE DIFICULTAT */
        .controls {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
            width: 100%;
            max-width: 420px;
        }

        .controls button {
            flex: 1;
            padding: 6px 4px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            background: white;
            color: var(--text);
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .controls button:hover { background: #e2e8f0; }
        .controls button.primary {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
        }
        .controls button.primary:hover { background: #1d4ed8; }
        .controls button.active-diff {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
        }

        /* TOOLBAR: desfer, notes, pista */
        .toolbar {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
            width: 100%;
            max-width: 420px;
        }
        .tool-btn {
            flex: 1;
            padding: 6px 4px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            background: white;
            color: var(--text);
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68rem;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }
        .tool-btn:hover { background: #e2e8f0; }
        .tool-btn.notes-on {
            background: #dcfce7;
            border-color: #16a34a;
            color: #15803d;
        }
        .tool-btn:disabled { opacity: 0.4; cursor: default; }

        /* TAULELL */
        .game-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            background: var(--line-thick);
            border: 2px solid var(--line-thick);
            border-radius: 4px;
            gap: 0;
            width: min(92vw, 92vw);
            height: min(92vw, 92vw);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            flex-shrink: 1;
            max-width: 440px;
            max-height: 440px;
        }

        .cell {
            background: var(--board-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            border-right:  1px solid var(--line-thin);
            border-bottom: 1px solid var(--line-thin);
            font-size: clamp(14px, 5vw, 26px);
            position: relative;
            overflow: hidden;
        }

        .cell:nth-child(9n)   { border-right: none; }
        .cell:nth-child(n+73) { border-bottom: none; }

        .cell.right-thick  { border-right:  2px solid var(--line-thick); }
        .cell.bottom-thick { border-bottom: 2px solid var(--line-thick); }

        .cell:hover    { background: var(--cell-hover); }
        .cell.fixed    { background: var(--cell-fixed); color: var(--text-fixed); cursor: default; }
        .cell.fixed:hover { background: var(--cell-fixed); }
        .cell.selected { background: var(--cell-sel) !important; }
        .cell.same-num { background: var(--cell-same); }
        .cell.user-input { color: var(--text-user); }
        .cell.error    { background: var(--cell-error) !important; color: var(--text-error); }

        /* NOTES (mini números) */
        .cell.has-notes { font-size: 0; }
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
        }
        .note-num {
            font-size: clamp(6px, 1.8vw, 10px);
            font-weight: 700;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* MISSATGE */
        .status {
            font-size: 0.72rem;
            font-weight: 700;
            height: 1em;
            color: #475569;
            text-align: center;
            flex-shrink: 0;
        }

        /* TECLAT NUMÈRIC */
        .numpad {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 420px;
            flex-shrink: 0;
        }

        .num-btn {
            padding: 10px 0;
            min-height: 44px;
            background: white;
            border: 1.5px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: background 0.15s;
        }
        .num-btn:hover { background: #e2e8f0; }
        .num-btn.del { background: #fee2e2; border-color: #fca5a5; color: #dc2626; font-size: clamp(12px, 3.5vw, 18px); }
        .num-btn.del:hover { background: #fecaca; }
        .num-btn.notes-mode { background: #dcfce7; border-color: #86efac; color: #15803d; }

        /* FOOTER */
        footer {
            background: #1e293b;
            border-top: 1px solid #334155;
            color: #64748b;
            text-align: center;
            padding: 5px;
            font-size: 10px;
            flex-shrink: 0;
        }
        footer a {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            opacity: 0.4;
            transition: opacity 0.2s;
            color: #cbd5e1;
            text-decoration: none;
        }
        footer a:hover { opacity: 0.8; }

        /* MODAL VICTÒRIA */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.65);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.actiu { display: flex; }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 28px 22px 22px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            text-align: center;
        }
        .modal-emoji { font-size: 3rem; margin-bottom: 8px; }
        .modal-titol { font-size: 1.3rem; font-weight: 900; color: #1e293b; margin-bottom: 6px; }
        .modal-temps { font-size: 1.1rem; font-weight: 700; color: #2563eb; margin-bottom: 16px; }
        .modal-text  { font-size: .85rem; color: #475569; margin-bottom: 18px; }
        .btn-modal { font-family: 'Montserrat',sans-serif; background: #2563eb; color: white; border: none; border-radius: 12px; padding: 13px 28px; font-size: .9rem; font-weight: 700; cursor: pointer; width: 100%; }
        .btn-modal:hover { background: #1d4ed8; }

        /* CONFETI */
        .confeti-c { position: fixed; inset: 0; pointer-events: none; z-index: 300; overflow: hidden; }
        .confeti-p { position: absolute; top: -20px; animation: cau linear forwards; }
        @keyframes cau { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        /* ESCRIPTORI */
        @media (min-width: 640px) {
            .game-board {
                width: min(60vmin, 440px);
                height: min(60vmin, 440px);
            }
            .numpad { width: min(60vmin, 440px); }
            .toolbar { width: min(60vmin, 440px); }
            .controls { width: min(60vmin, 440px); }
            .cell { font-size: clamp(14px, 3vmin, 26px); }
            main { justify-content: space-evenly; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="https://ja.cat/appgobo" class="logo">
            <svg width="32" height="32" viewBox="0 0 40 46" fill="none">
                <path d="M20 1L38 11V33L20 43L2 33V11L20 1Z" fill="#2563eb" stroke="#60a5fa" stroke-width="1.5"/>
                <text x="20" y="23" text-anchor="middle" fill="white" font-family="Montserrat,sans-serif" font-weight="900" font-size="9">GOBO</text>
                <text x="20" y="33" text-anchor="middle" fill="#93c5fd" font-family="Montserrat,sans-serif" font-weight="900" font-size="7">26</text>
            </svg>
            <span class="logo-txt">Gobo<span>26</span></span>
        </a>
        <span class="hdr-title">SUDOKU</span>
        <span id="timer-display">0:00</span>
    </header>

    <!-- MAIN -->
    <main>
        <div class="controls">
            <button id="btn-facil"  onclick="newGame('easy')">Fàcil</button>
            <button id="btn-mitja"  onclick="newGame('medium')">Mitjà</button>
            <button id="btn-dificil" onclick="newGame('hard')">Difícil</button>
            <button class="primary" onclick="checkSolution()">Comprovar</button>
        </div>

        <div class="toolbar">
            <button class="tool-btn" id="btn-desfer" onclick="desfer()" title="Desfer">↩ Desfer</button>
            <button class="tool-btn" id="btn-notes" onclick="toggleNotes()" title="Mode notes">✏️ Notes</button>
            <button class="tool-btn" id="btn-pista" onclick="donarPista()" title="Pista">💡 Pista</button>
        </div>

        <div id="board" class="game-board"></div>

        <div class="status" id="message"></div>

        <div class="numpad" id="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn del" onclick="inputNumber('delete')">✕</button>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <a href="https://ja.cat/appgobo" target="_blank" rel="noopener noreferrer"
           onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=0.4">
            <svg width="12" height="12" viewBox="0 0 100 100" fill="none">
                <polygon points="50,2 93,26 93,74 50,98 7,74 7,26" fill="#94a3b8"/>
                <text x="50" y="44" text-anchor="middle" fill="white" font-size="26" font-weight="800" font-family="sans-serif">G</text>
                <text x="50" y="68" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700" font-family="sans-serif">26</text>
            </svg>
            Una aplicació de Gobo26
        </a>
    </footer>

    <!-- MODAL VICTÒRIA -->
    <div class="modal-overlay" id="modal-victora">
        <div class="modal">
            <div class="modal-emoji">🎉</div>
            <div class="modal-titol">Sudoku completat!</div>
            <div class="modal-temps" id="modal-temps-text"></div>
            <div class="modal-text" id="modal-body"></div>
            <button class="btn-modal" onclick="document.getElementById('modal-victora').classList.remove('actiu')">Tanca</button>
        </div>
    </div>

    <!-- CONFETI -->
    <div class="confeti-c" id="confeti"></div>

    <script>
        let board = [], solution = [], selectedCell = null;
        let notesBoard = [];          // notes[r][c] = Set de números candidats
        let notesMode = false;
        let historial = [];           // [{row, col, prev, prevNotes, isnotes}]
        let currentDifficulty = 'easy';
        let pistes = 3;

        // ── TIMER ────────────────────────────────────────────────────────────
        let timerInterval = null;
        let timerSeconds = 0;
        let timerRunning = false;

        function startTimer() {
            stopTimer();
            timerSeconds = 0;
            updateTimerDisplay();
            timerRunning = true;
            timerInterval = setInterval(() => {
                timerSeconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            timerRunning = false;
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            document.getElementById('timer-display').textContent =
                m + ':' + String(s).padStart(2, '0');
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return m > 0 ? `${m} min ${s} seg` : `${s} seg`;
        }

        // ── JOCS ─────────────────────────────────────────────────────────────
        window.onload = () => newGame('easy');

        function newGame(difficulty) {
            currentDifficulty = difficulty;
            pistes = 3;
            document.getElementById('btn-pista').textContent = '💡 Pista (3)';
            document.getElementById('btn-pista').disabled = false;

            // Destacar dificultat activa
            ['btn-facil','btn-mitja','btn-dificil'].forEach(id =>
                document.getElementById(id).classList.remove('active-diff'));
            const map = { easy:'btn-facil', medium:'btn-mitja', hard:'btn-dificil' };
            document.getElementById(map[difficulty]).classList.add('active-diff');

            generateSudoku();
            removeNumbers(difficulty);
            notesBoard = Array(9).fill(null).map(() => Array(9).fill(null).map(() => new Set()));
            historial = [];
            notesMode = false;
            updateNotesUI();
            renderBoard();
            document.getElementById('message').textContent = '';
            selectedCell = null;
            startTimer();
        }

        function generateSudoku() {
            solution = Array(9).fill().map(() => Array(9).fill(0));
            fillDiagonal();
            solveSudoku(solution);
            board = JSON.parse(JSON.stringify(solution));
        }

        function fillDiagonal() {
            for (let i = 0; i < 9; i += 3) fillBox(i, i);
        }

        function fillBox(row, col) {
            let num;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    do { num = Math.floor(Math.random() * 9) + 1; }
                    while (!isSafeInBox(row, col, num));
                    solution[row + i][col + j] = num;
                }
            }
        }

        function isSafeInBox(rs, cs, num) {
            for (let i = 0; i < 3; i++)
                for (let j = 0; j < 3; j++)
                    if (solution[rs+i][cs+j] === num) return false;
            return true;
        }

        function isSafe(grid, row, col, num) {
            for (let x = 0; x < 9; x++)
                if (grid[row][x] === num || grid[x][col] === num) return false;
            let sr = row - row%3, sc = col - col%3;
            for (let i = 0; i < 3; i++)
                for (let j = 0; j < 3; j++)
                    if (grid[sr+i][sc+j] === num) return false;
            return true;
        }

        function solveSudoku(grid) {
            for (let i = 0; i < 9; i++)
                for (let j = 0; j < 9; j++)
                    if (grid[i][j] === 0) {
                        for (let n = 1; n <= 9; n++) {
                            if (isSafe(grid, i, j, n)) {
                                grid[i][j] = n;
                                if (solveSudoku(grid)) return true;
                                grid[i][j] = 0;
                            }
                        }
                        return false;
                    }
            return true;
        }

        function removeNumbers(difficulty) {
            let count = difficulty === 'easy' ? 30 : difficulty === 'medium' ? 45 : 55;
            while (count > 0) {
                let r = Math.floor(Math.random()*9), c = Math.floor(Math.random()*9);
                if (board[r][c] !== 0) { board[r][c] = 0; count--; }
            }
        }

        // ── RENDER ────────────────────────────────────────────────────────────
        function renderBoard() {
            const container = document.getElementById('board');
            container.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const div = document.createElement('div');
                    div.classList.add('cell');
                    if (j === 2 || j === 5) div.classList.add('right-thick');
                    if (i === 2 || i === 5) div.classList.add('bottom-thick');

                    if (board[i][j] !== 0) {
                        div.textContent = board[i][j];
                        div.classList.add('fixed');
                    } else {
                        div.classList.add('user-input');
                        div.dataset.row = i;
                        div.dataset.col = j;
                        div.onclick = () => selectCell(div);
                        renderCellContent(div, i, j);
                    }
                    container.appendChild(div);
                }
            }
        }

        function renderCellContent(div, r, c) {
            const notes = notesBoard[r][c];
            const num = parseInt(div.textContent) || 0;

            // If has real number
            if (num > 0) {
                div.classList.remove('has-notes');
                div.innerHTML = num;
                return;
            }
            // If has notes
            if (notes && notes.size > 0) {
                div.classList.add('has-notes');
                const grid = document.createElement('div');
                grid.className = 'notes-grid';
                for (let n = 1; n <= 9; n++) {
                    const span = document.createElement('span');
                    span.className = 'note-num';
                    span.textContent = notes.has(n) ? n : '';
                    grid.appendChild(span);
                }
                div.innerHTML = '';
                div.appendChild(grid);
            } else {
                div.classList.remove('has-notes');
                div.innerHTML = '';
            }
        }

        function refreshAllCells() {
            document.querySelectorAll('.cell.user-input').forEach(div => {
                const r = parseInt(div.dataset.row), c = parseInt(div.dataset.col);
                renderCellContent(div, r, c);
            });
        }

        // ── SELECCIÓ ────────────────────────────────────────────────────────
        function selectCell(div) {
            // Eliminar selecció i subratllats anteriors
            document.querySelectorAll('.cell.selected, .cell.same-num').forEach(el => {
                el.classList.remove('selected', 'same-num');
            });

            selectedCell = div;
            div.classList.add('selected');

            // Subratllar celes amb el mateix número
            const selNum = parseInt(div.textContent) || 0;
            if (selNum > 0) {
                document.querySelectorAll('.cell').forEach(el => {
                    if (el !== div) {
                        const txt = parseInt(el.textContent) || 0;
                        if (txt === selNum && !el.classList.contains('has-notes')) {
                            el.classList.add('same-num');
                        }
                    }
                });
            }
        }

        // ── INPUT ─────────────────────────────────────────────────────────────
        function inputNumber(num) {
            if (!selectedCell) return;
            const r = parseInt(selectedCell.dataset.row);
            const c = parseInt(selectedCell.dataset.col);
            const prevVal = parseInt(selectedCell.textContent) || 0;
            const prevNotes = new Set(notesBoard[r][c]);

            if (notesMode && num !== 'delete') {
                // Mode notes: toggle el número
                historial.push({ row: r, col: c, prev: prevVal, prevNotes: new Set(prevNotes), isNotes: true });
                if (notesBoard[r][c].has(num)) notesBoard[r][c].delete(num);
                else notesBoard[r][c].add(num);
                renderCellContent(selectedCell, r, c);
            } else if (num === 'delete') {
                historial.push({ row: r, col: c, prev: prevVal, prevNotes: new Set(prevNotes), isNotes: false });
                selectedCell.textContent = '';
                selectedCell.classList.remove('error');
                notesBoard[r][c].clear();
                renderCellContent(selectedCell, r, c);
            } else {
                // Mode normal: posar número
                historial.push({ row: r, col: c, prev: prevVal, prevNotes: new Set(prevNotes), isNotes: false });
                notesBoard[r][c].clear();
                selectedCell.textContent = num;
                selectedCell.classList.remove('error', 'has-notes');
                // Actualitzar subratllat
                selectCell(selectedCell);
            }
        }

        // ── DESFER ────────────────────────────────────────────────────────────
        function desfer() {
            if (!historial.length) return;
            const last = historial.pop();
            const { row, col, prev, prevNotes } = last;
            const div = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            if (!div) return;
            notesBoard[row][col] = new Set(prevNotes);
            if (prev > 0) {
                div.textContent = prev;
                div.classList.remove('error', 'has-notes');
            } else {
                div.textContent = '';
                div.classList.remove('error');
            }
            renderCellContent(div, row, col);
        }

        // ── NOTES ─────────────────────────────────────────────────────────────
        function toggleNotes() {
            notesMode = !notesMode;
            updateNotesUI();
        }

        function updateNotesUI() {
            const btn = document.getElementById('btn-notes');
            btn.classList.toggle('notes-on', notesMode);
            btn.textContent = notesMode ? '✏️ Notes ON' : '✏️ Notes';
            document.querySelectorAll('.num-btn:not(.del)').forEach(b =>
                b.classList.toggle('notes-mode', notesMode));
        }

        // ── PISTA ─────────────────────────────────────────────────────────────
        function donarPista() {
            if (pistes <= 0) return;
            // Buscar celes buides i mostrar-ne una aleatòria
            const buides = [];
            document.querySelectorAll('.cell.user-input').forEach(div => {
                const r = parseInt(div.dataset.row), c = parseInt(div.dataset.col);
                const v = parseInt(div.textContent) || 0;
                if (v === 0 || div.classList.contains('error')) buides.push({ div, r, c });
            });
            if (!buides.length) return;
            const target = buides[Math.floor(Math.random() * buides.length)];
            const { div, r, c } = target;
            notesBoard[r][c].clear();
            div.textContent = solution[r][c];
            div.classList.remove('error', 'has-notes');
            div.style.color = '#9333ea'; // violeta per pistes
            pistes--;
            document.getElementById('btn-pista').textContent = `💡 Pista (${pistes})`;
            if (pistes === 0) document.getElementById('btn-pista').disabled = true;
            selectCell(div);
        }

        // ── TECLAT FÍSIC ───────────────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (!selectedCell) return;
            if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
            else if (e.key === 'Backspace' || e.key === 'Delete') inputNumber('delete');
            else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); desfer(); }
            else if (e.key === 'n') toggleNotes();
            // Navegació amb tecles de fletxa
            else if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const r = parseInt(selectedCell.dataset.row);
                const c = parseInt(selectedCell.dataset.col);
                let nr = r, nc = c;
                if (e.key === 'ArrowUp')    nr = Math.max(0, r - 1);
                if (e.key === 'ArrowDown')  nr = Math.min(8, r + 1);
                if (e.key === 'ArrowLeft')  nc = Math.max(0, c - 1);
                if (e.key === 'ArrowRight') nc = Math.min(8, c + 1);
                const next = document.querySelector(`.cell[data-row="${nr}"][data-col="${nc}"]`);
                if (next) selectCell(next);
            }
        });

        // ── COMPROVAR ─────────────────────────────────────────────────────────
        function checkSolution() {
            const cells = document.querySelectorAll('.cell.user-input');
            let errors = 0, filled = 0;
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row), c = parseInt(cell.dataset.col);
                const val = parseInt(cell.textContent);
                if (cell.textContent && !cell.classList.contains('has-notes') && val > 0) {
                    filled++;
                    if (val !== solution[r][c]) { cell.classList.add('error'); errors++; }
                    else cell.classList.remove('error');
                }
            });
            const msg = document.getElementById('message');
            if (errors > 0) {
                msg.textContent = `Tens ${errors} error${errors>1?'s':''}. Continua!`;
                msg.style.color = '#dc2626';
            } else if (filled === cells.length) {
                stopTimer();
                msg.textContent = '🎉 Felicitats! Sudoku completat!';
                msg.style.color = '#16a34a';
                mostrarVictoria();
            } else {
                msg.textContent = 'De moment tot correcte, però no has acabat.';
                msg.style.color = '#2563eb';
            }
        }

        function mostrarVictoria() {
            const difNom = { easy: 'Fàcil', medium: 'Mitjà', hard: 'Difícil' };
            document.getElementById('modal-temps-text').textContent =
                `Temps: ${formatTime(timerSeconds)}`;
            document.getElementById('modal-body').textContent =
                `Dificultat: ${difNom[currentDifficulty]} · Pistes usades: ${3 - pistes}/3`;
            document.getElementById('modal-victora').classList.add('actiu');
            llençarConfeti();
        }

        function llençarConfeti() {
            const cont = document.getElementById('confeti');
            cont.innerHTML = '';
            const cs = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed'];
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'confeti-p';
                p.style.left = Math.random()*100 + 'vw';
                p.style.width = p.style.height = (6 + Math.random()*8) + 'px';
                p.style.backgroundColor = cs[Math.floor(Math.random()*cs.length)];
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                p.style.animationDuration = (1.5 + Math.random()*2) + 's';
                p.style.animationDelay = Math.random()*0.6 + 's';
                cont.appendChild(p);
                p.addEventListener('animationend', () => p.remove());
            }
        }

    </script>

</body>
</html>
