        // --- ICONES SVG ---

        const IconDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>;
        const IconFile = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;

        const IconCancel = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconStart = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20"/><path d="M2 12h20"/><path d="m4.93 4.93 14.14 14.14"/><path d="m19.07 4.93-14.14 14.14"/></svg>;
        const IconCalc = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="16" y1="18" x2="16" y2="18"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="12" y1="18" x2="12" y2="18"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="8" y1="18" x2="8" y2="18"/></svg>;
        const IconX = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;

        // --- COMPONENT CALCULADORA ---
        const CalculatorWidget = ({ isOpen, onClose }) => {
            const [display, setDisplay] = useState('0');
            const [prevValue, setPrevValue] = useState(null);
            const [operator, setOperator] = useState(null);
            const [waitingForOperand, setWaitingForOperand] = useState(false);

            // Funcions embolicades en useCallback per a poder usar-les al useEffect del teclat
            const inputDigit = useCallback((digit) => {
                setDisplay((prevDisplay) => {
                    if (waitingForOperand) {
                        return String(digit);
                    } else {
                        return prevDisplay === '0' ? String(digit) : prevDisplay + digit;
                    }
                });
                if (waitingForOperand) setWaitingForOperand(false);
            }, [waitingForOperand]);

            const inputDot = useCallback(() => {
                setDisplay((prevDisplay) => {
                    if (waitingForOperand) {
                        setWaitingForOperand(false);
                        return '0.';
                    } else if (prevDisplay.indexOf('.') === -1) {
                        return prevDisplay + '.';
                    }
                    return prevDisplay;
                });
            }, [waitingForOperand]);

            const clear = useCallback(() => {
                setDisplay('0');
                setPrevValue(null);
                setOperator(null);
                setWaitingForOperand(false);
            }, []);

            const calculate = (prev, next, op) => {
                switch (op) {
                    case '+': return prev + next;
                    case '-': return prev - next;
                    case '*': return prev * next;
                    case '/': return prev / next;
                    case '=': return next;
                    default: return next;
                }
            };

            const performOperation = useCallback((nextOperator) => {
                const inputValue = parseFloat(display);

                if (prevValue === null) {
                    setPrevValue(inputValue);
                } else if (operator) {
                    const currentValue = prevValue || 0;
                    // Aquí tenim un petit problema de closure amb l'estat 'prevValue' si no usem useRef o similar,
                    // però en aquest disseny simple, confiarem en l'actualització.
                    // Per fer-ho robust al teclat, recalcularem basant-nos en l'últim render.
                    // Com que 'performOperation' depèn de 'prevValue', 'operator' i 'display', es regenera.
                    
                    // Nota: Per simplificar la lògica del teclat sense refactoritzar-ho tot a useReducer:
                    // La lògica original ja anava bé, només calia assegurar les dependències correctes.
                }

                // Per evitar problemes complexos de closure al teclat, farem servir la lògica
                // dins del render per actualitzar, però aquí simplifiquem:
                
                setDisplay((currentDisplay) => {
                    const currentInput = parseFloat(currentDisplay);
                    let newVal = currentInput;
                    
                    if (prevValue !== null && operator) {
                         newVal = calculate(prevValue, currentInput, operator);
                         setPrevValue(newVal);
                         return String(newVal);
                    } else {
                        setPrevValue(currentInput);
                        return String(currentInput);
                    }
                });

                setWaitingForOperand(true);
                setOperator(nextOperator);
            }, [display, prevValue, operator]);


            // --- LÓGICA DEL TECLAT ---
            useEffect(() => {
                if (!isOpen) return;

                const handleKeyDown = (event) => {
                    const { key } = event;

                    // Números 0-9
                    if (/\d/.test(key)) {
                        event.preventDefault();
                        inputDigit(parseInt(key, 10));
                    }
                    // Operadors
                    else if (['+', '-', '*', '/'].includes(key)) {
                        event.preventDefault();
                        performOperation(key);
                    }
                    // Decimal
                    else if (key === '.' || key === ',') {
                        event.preventDefault();
                        inputDot();
                    }
                    // Resultat (Enter o =)
                    else if (key === 'Enter' || key === '=') {
                        event.preventDefault();
                        performOperation('=');
                    }
                    // Esborrar (Escape, C, Backspace)
                    else if (key === 'Escape' || key.toLowerCase() === 'c' || key === 'Backspace') {
                        event.preventDefault();
                        clear();
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isOpen, inputDigit, inputDot, performOperation, clear]); // Re-bind quan canvien les dependències


            if (!isOpen) return null;

            const Button = ({ label, onClick, className = "", isOperator = false }) => (
                <button 
                    onClick={onClick}
                    className={`h-12 text-lg font-bold rounded-lg shadow-sm active:scale-95 transition-transform 
                    ${isOperator 
                        ? 'bg-amber-500 hover:bg-amber-600 text-white' 
                        : 'bg-slate-700 hover:bg-slate-600 text-white'} 
                    ${className}`}
                    type="button"
                >
                    {label}
                </button>
            );

            return (
                <div className="fixed bottom-32 right-8 w-72 bg-slate-800 p-4 rounded-xl shadow-2xl z-50 border border-slate-600 animate-slide-up">
                    <div className="flex justify-between items-center mb-4">
                        <span className="text-slate-300 font-bold text-sm uppercase tracking-wider">Calculadora</span>
                        <button onClick={onClose} className="text-slate-400 hover:text-white"><IconX /></button>
                    </div>
                    
                    <div className="bg-slate-900 p-4 rounded-lg mb-4 text-right">
                        <span className="text-3xl text-emerald-400 font-mono tracking-widest overflow-x-auto block">
                            {display.substring(0, 12)}
                        </span>
                    </div>

                    <div className="grid grid-cols-4 gap-2">
                        <Button label="C" onClick={clear} className="col-span-1 bg-red-500 hover:bg-red-600 text-white" />
                        <Button label="/" onClick={() => performOperation('/')} isOperator />
                        <Button label="*" onClick={() => performOperation('*')} isOperator />
                        <Button label="-" onClick={() => performOperation('-')} isOperator />
                        
                        <Button label="7" onClick={() => inputDigit(7)} />
                        <Button label="8" onClick={() => inputDigit(8)} />
                        <Button label="9" onClick={() => inputDigit(9)} />
                        <Button label="+" onClick={() => performOperation('+')} className="row-span-2 h-full" isOperator />
                        
                        <Button label="4" onClick={() => inputDigit(4)} />
                        <Button label="5" onClick={() => inputDigit(5)} />
                        <Button label="6" onClick={() => inputDigit(6)} />
                        
                        <Button label="1" onClick={() => inputDigit(1)} />
                        <Button label="2" onClick={() => inputDigit(2)} />
                        <Button label="3" onClick={() => inputDigit(3)} />
                        <Button label="=" onClick={() => performOperation('=')} className="row-span-2 h-full bg-emerald-600 hover:bg-emerald-500" />

                        <Button label="0" onClick={() => inputDigit(0)} className="col-span-2" />
                        <Button label="." onClick={inputDot} />
                    </div>
                </div>
            );
        };

        const App = () => {
            // --- ESTATS ---
            const [entries, setEntries] = useState(() => {
                const saved = localStorage.getItem('fetdefils_dades');
                const parsed = saved ? JSON.parse(saved) : [];
                return parsed.map(entry => ({
                    ...entry,
                    isDeductible: entry.hasOwnProperty('isDeductible') ? entry.isDeductible : true
                }));
            });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                type: 'ingres', 
                concept: '',
                amountBase: '',
                vatRate: 21,
                irpfRate: 15,
                isDeductible: true
            });

            const [reportDates, setReportDates] = useState({
                start: new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0], // 1 de Gener any actual
                end: new Date().toISOString().split('T')[0] // Avui
            });

            const [editingId, setEditingId] = useState(null); 
            const [activeTab, setActiveTab] = useState('registre');
            const [showCalculator, setShowCalculator] = useState(false);
            const fileInputRef = useRef(null);

            // --- EFECTES ---
            useEffect(() => {
                localStorage.setItem('fetdefils_dades', JSON.stringify(entries));
            }, [entries]);

            // --- CÀLCULS AUXILIARS ---
            const getQuarter = (dateString) => {
                const month = new Date(dateString).getMonth() + 1;
                return Math.ceil(month / 3);
            };

            const calculateTotals = (item) => {
                const base = parseFloat(item.amountBase) || 0;
                const vat = base * (parseFloat(item.vatRate) / 100);
                const irpf = base * (parseFloat(item.irpfRate) / 100);
                const total = base + vat - irpf;
                return { base, vat, irpf, total };
            };

            // ORDENACIÓ PER DATA (Més nou primer)
            const sortedEntries = useMemo(() => {
                return [...entries].sort((a, b) => {
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    // Si la data és igual, l'últim creat primer (ID més alt)
                    if (dateB.getTime() === dateA.getTime()) {
                        return b.id - a.id;
                    }
                    return dateB - dateA;
                });
            }, [entries]);

            // Llibre Major GLOBAL (Ordenat Recent -> Antic)
            // Utilitzem sortedEntries però invertit per calcular saldos (Antic -> Recent)
            const getLedgerData = () => {
                // Necessitem ordre cronològic pur (antic -> nou) per calcular saldos progressius
                const chronological = [...entries].sort((a, b) => {
                    return new Date(a.date) - new Date(b.date) || a.id - b.id;
                });

                let balance = 0;
                const withBalance = chronological.map(entry => {
                    const amount = entry.type === 'ingres' ? entry.total : -entry.total;
                    balance += amount;
                    return { ...entry, balance, amountSigned: amount };
                });
                
                // Retornem invertit per mostrar el més recent a dalt
                return withBalance.reverse();
            };

            // Llibre Major PER A INFORME PDF
            const getReportData = () => {
                const previousEntries = entries.filter(e => e.date < reportDates.start);
                const initialBalance = previousEntries.reduce((acc, curr) => {
                    const amount = curr.type === 'ingres' ? curr.total : -curr.total;
                    return acc + amount;
                }, 0);

                const periodEntries = entries.filter(e => e.date >= reportDates.start && e.date <= reportDates.end);
                // Ordenar Antic -> Recent
                periodEntries.sort((a, b) => new Date(a.date) - new Date(b.date) || a.id - b.id);

                let runningBalance = initialBalance;
                const finalReport = periodEntries.map(entry => {
                    const amount = entry.type === 'ingres' ? entry.total : -entry.total;
                    runningBalance += amount;
                    return { ...entry, balance: runningBalance, amountSigned: amount };
                });

                return { initialBalance, data: finalReport, finalBalance: runningBalance };
            };

            // --- GESTIÓ DEL FORMULARI ---
            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                const finalValue = type === 'checkbox' ? checked : value;
                setFormData({ ...formData, [name]: finalValue });
            };

            const handleReportDateChange = (e) => {
                const { name, value } = e.target;
                setReportDates({ ...reportDates, [name]: value });
            }

            const handleTypeChange = (newType) => {
                if (newType === 'ingres') {
                    setFormData({...formData, type: 'ingres', irpfRate: 15, vatRate: 21, isDeductible: true, concept: ''});
                } else if (newType === 'despesa') {
                    setFormData({...formData, type: 'despesa', irpfRate: 0, vatRate: 21, isDeductible: true, concept: ''});
                } else if (newType === 'saldo_inicial') {
                     setFormData({
                        ...formData, 
                        type: 'ingres', 
                        concept: 'Saldo Inicial ' + new Date().getFullYear(), 
                        irpfRate: 0, 
                        vatRate: 0, 
                        isDeductible: false
                    });
                }
            };

            const startEditing = (entry) => {
                setFormData({
                    date: entry.date,
                    type: entry.type,
                    concept: entry.concept,
                    amountBase: entry.amountBase,
                    vatRate: entry.vatRate,
                    irpfRate: entry.irpfRate,
                    isDeductible: entry.hasOwnProperty('isDeductible') ? entry.isDeductible : true
                });
                setEditingId(entry.id);
                setActiveTab('registre'); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEditing = () => {
                setEditingId(null);
                setFormData({
                    date: new Date().toISOString().split('T')[0],
                    type: 'ingres', 
                    concept: '',
                    amountBase: '',
                    vatRate: 21,
                    irpfRate: 15,
                    isDeductible: true
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.concept || !formData.amountBase) return;

                const calculations = calculateTotals(formData);

                if (editingId) {
                    const updatedEntries = entries.map(entry => {
                        if (entry.id === editingId) {
                            return {
                                ...entry,
                                ...formData,
                                quarter: getQuarter(formData.date),
                                ...calculations
                            };
                        }
                        return entry;
                    });
                    setEntries(updatedEntries);
                    setEditingId(null);
                } else {
                    const newEntry = {
                        id: Date.now(),
                        ...formData,
                        quarter: getQuarter(formData.date),
                        ...calculations
                    };
                    setEntries([newEntry, ...entries]);
                }

                setFormData({ 
                    date: new Date().toISOString().split('T')[0],
                    type: 'ingres', 
                    concept: '',
                    amountBase: '',
                    vatRate: 21,
                    irpfRate: 15,
                    isDeductible: true
                });
            };

            const handleDelete = (id) => {
                if (window.confirm("Estàs segur que vols esborrar aquest apunt?")) {
                    setEntries(entries.filter(e => e.id !== id));
                    if (editingId === id) cancelEditing();
                }
            };

            // --- IMPORTAR / EXPORTAR ---
            const exportToCSV = () => {
                const headers = "Data,Trimestre,Tipus,Concepte,Base Imposable,IVA %,Quota IVA,% IRPF,Quota IRPF,Total Moviment,Deduible\n";
                const rows = entries.map(e => 
                    `${e.date},T${e.quarter},${e.type},"${e.concept}",${e.base.toFixed(2)},${e.vatRate}%,${e.vat.toFixed(2)},${e.irpfRate}%,${e.irpf.toFixed(2)},${e.total.toFixed(2)},${e.isDeductible ? 'SI' : 'NO'}`
                ).join("\n");
                
                const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `Fetdefils_Comptes_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
            };

            const backupData = () => {
                const dataStr = JSON.stringify(entries, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `Còpia_Seguretat_Fetdefils_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(link);
                link.click();

            const restoreData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const loadedData = JSON.parse(event.target.result);
                        if (Array.isArray(loadedData)) {
                            if(window.confirm(`Es carregaran ${loadedData.length} apunts. Això substituirà les dades actuals. Continuar?`)){
                                const sanitizedData = loadedData.map(entry => ({
                                    ...entry,
                                    isDeductible: entry.hasOwnProperty('isDeductible') ? entry.isDeductible : true
                                }));
                                setEntries(sanitizedData);
                                alert("Dades recuperades correctament!");
                            }
                        } else { alert("El fitxer no sembla correcte."); }
                    } catch (err) { alert("Error llegint el fitxer: " + err); }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const handlePrint = () => {
                window.print();

            // --- CÀLCULS FISCALS ---

                const summary = {
                    T1: { income: 0, expense: 0, vatCollected: 0, vatPaid: 0, irpf130_Deduit: 0, irpf111_A_Pagar: 0, netResult: 0 },
                    T2: { income: 0, expense: 0, vatCollected: 0, vatPaid: 0, irpf130_Deduit: 0, irpf111_A_Pagar: 0, netResult: 0 },
                    T3: { income: 0, expense: 0, vatCollected: 0, vatPaid: 0, irpf130_Deduit: 0, irpf111_A_Pagar: 0, netResult: 0 },
                    T4: { income: 0, expense: 0, vatCollected: 0, vatPaid: 0, irpf130_Deduit: 0, irpf111_A_Pagar: 0, netResult: 0 },
                };

                    // NOMÉS COMPTEM SI ÉS DEDUÏBLE
                    if (e.isDeductible === false) return;

                    const q = `T${e.quarter}`;
                    const calcs = calculateTotals(e);
                    
                    if (e.type === 'ingres') {
                        summary[q].income += calcs.base;
                        summary[q].vatCollected += calcs.vat;
                        summary[q].irpf130_Deduit += calcs.irpf;
                    } else {
                        summary[q].expense += calcs.base;
                        summary[q].vatPaid += calcs.vat;
                        summary[q].irpf111_A_Pagar += calcs.irpf;
                    }
                    summary[q].netResult = summary[q].income - summary[q].expense;
                });
                return summary;
            };

                                <div className="bg-white p-8 rounded-xl shadow-lg border border-slate-200 print:shadow-none print:border-none print:p-0">
                                    <div className="text-center mb-8 border-b-2 border-slate-800 pb-4">
                                        <h1 className="text-3xl font-bold text-slate-900 uppercase tracking-widest">Llibre Major</h1>
                                        <h2 className="text-xl text-slate-600 mt-1">FET DE FILS</h2>
                                        <p className="text-slate-500 mt-2 font-mono">Període: {reportDates.start.split('-').reverse().join('/')} - {reportDates.end.split('-').reverse().join('/')}</p>
                                    </div>

                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-slate-100 text-slate-900 font-bold uppercase border-b-2 border-slate-900 text-xs">
                                            <tr>
                                                <th className="p-3">Data</th>
                                                <th className="p-3">Concepte</th>
                                                <th className="p-3 text-right">Import</th>
                                                <th className="p-3 text-right">Saldo Acumulat</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200">
                                            {/* FILA SALDO INICIAL */}
                                            <tr className="bg-slate-50 font-bold text-slate-700 italic">
                                                <td className="p-3">-</td>
                                                <td className="p-3">SALDO INICIAL (Anterior a {reportDates.start.split('-').reverse().join('/')})</td>
                                                <td className="p-3 text-right">-</td>
                                                <td className="p-3 text-right font-mono">{reportData.initialBalance.toFixed(2)}€</td>
                                            </tr>
                                            
                                            {/* MOVIMENTS */}
                                            {reportData.data.length === 0 ? (
                                                <tr><td colSpan="4" className="p-8 text-center text-slate-400 italic">No hi ha moviments en aquest període.</td></tr>
                                            ) : (
                                                reportData.data.map((entry) => (
                                                    <tr key={entry.id}>
                                                        <td className="p-3 whitespace-nowrap font-mono text-slate-600">{entry.date.split('-').reverse().join('/')}</td>
                                                        <td className="p-3 text-slate-800">
                                                            {entry.concept} 
                                                            {!entry.isDeductible && <span className="text-slate-400 text-xs ml-2">(No Fiscal)</span>}
                                                        </td>
                                                        <td className={`p-3 text-right font-mono font-bold ${entry.amountSigned > 0 ? 'text-emerald-700' : 'text-red-700'}`}>
                                                            {entry.amountSigned > 0 ? '+' : ''}{entry.amountSigned.toFixed(2)}€
                                                        </td>
                                                        <td className="p-3 text-right font-mono font-bold text-slate-900 bg-slate-50">
                                                            {entry.balance.toFixed(2)}€
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                        <tfoot className="border-t-2 border-slate-900 bg-slate-100 font-bold text-slate-900">
                                            <tr>
                                                <td colSpan="3" className="p-4 text-right uppercase">Saldo Final del Període:</td>
                                                <td className="p-4 text-right font-mono text-lg">{reportData.finalBalance.toFixed(2)}€</td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                    
                                    <div className="mt-8 pt-4 border-t border-slate-200 text-center text-xs text-slate-400">
                                        Generat el {new Date().toLocaleDateString()} a les {new Date().toLocaleTimeString()}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'fiscal' && (
                            <div className="space-y-8 animate-fade-in no-print">
                                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r shadow-sm flex items-start gap-3">
                                    <IconAlert />
                                    <div className="text-blue-800 text-sm">
                                        <strong>Nota:</strong> Els moviments marcats com a "No deduïbles" (Saldos Inicials, impostos, retirades personals...) no es tenen en compte en aquests càlculs, però sí al Llibre Major.
                                    </div>
                                </div>

                                <div className="grid lg:grid-cols-2 gap-8">
                                    {['T1', 'T2', 'T3', 'T4'].map((q) => (
                                        <div key={q} className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden flex flex-col">
                                            <div className="bg-slate-800 text-white p-4 border-b border-slate-700 flex justify-between items-center">
                                                <h3 className="font-bold text-lg">Trimestre {q.replace('T','')}</h3>
                                                <span className={`text-xs font-bold px-3 py-1 rounded-full ${fiscalData[q].netResult >= 0 ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`}>
                                                    Benefici: {fiscalData[q].netResult.toFixed(2)}€
                                                </span>
                                            </div>
                                            
                                            <div className="p-5 flex-grow space-y-6">
                                                {/* MODEL 303 - IVA */}
                                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                                                        <span className="w-2 h-2 rounded-full bg-slate-400"></span> Model 303 (IVA)
                                                    </h4>
                                                    <div className="flex justify-between items-center mb-2 text-sm">
                                                        <span className="text-slate-600">Repercutit (Cobrat):</span>
                                                        <span className="font-mono text-emerald-600 font-medium">+{fiscalData[q].vatCollected.toFixed(2)}€</span>
                                                    </div>
                                                    <div className="flex justify-between items-center mb-3 text-sm">
                                                        <span className="text-slate-600">Suportat (Pagat):</span>
                                                        <span className="font-mono text-amber-600 font-medium">-{fiscalData[q].vatPaid.toFixed(2)}€</span>
                                                    </div>
                                                    <div className="pt-2 border-t border-slate-200 flex justify-between items-center">
                                                        <span className="text-sm font-bold text-slate-700">Resultat IVA:</span>
                                                        <span className={`font-mono font-bold text-lg ${(fiscalData[q].vatCollected - fiscalData[q].vatPaid) > 0 ? 'text-red-600' : 'text-emerald-600'}`}>
                                                            {(fiscalData[q].vatCollected - fiscalData[q].vatPaid).toFixed(2)}€
                                                        </span>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {/* MODEL 130 - IRPF PROPI */}
                                                    <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-100">
                                                        <h4 className="text-xs font-bold text-yellow-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                                                            <span className="w-2 h-2 rounded-full bg-yellow-500"></span> Model 130
                                                        </h4>
                                                        <div className="text-xs text-slate-600 mb-2 space-y-1">
                                                            <div className="flex justify-between"><span>Ingressos:</span> <span>{fiscalData[q].income.toFixed(2)}</span></div>
                                                            <div className="flex justify-between"><span>Despeses:</span> <span>-{fiscalData[q].expense.toFixed(2)}</span></div>
                                                            <div className="flex justify-between font-medium pt-1 border-t border-yellow-200"><span>Net:</span> <span>{fiscalData[q].netResult.toFixed(2)}</span></div>
                                                        </div>
                                                        
                                                        <div className="mt-3 pt-2 border-t border-yellow-200">
                                                            <p className="text-[10px] text-yellow-800 uppercase font-bold mb-1">A pagar (20% Benefici - Retencions):</p>
                                                            <div className="text-xs text-slate-500 mb-1 flex justify-between">
                                                                <span>Retencions patides:</span>
                                                                <span className="text-red-400">-{fiscalData[q].irpf130_Deduit.toFixed(2)}€</span>
                                                            </div>
                                                            <span className="block text-right font-bold font-mono text-xl text-yellow-700 mt-2">
                                                                {Math.max(0, ((fiscalData[q].income - fiscalData[q].expense) * 0.20) - fiscalData[q].irpf130_Deduit).toFixed(2)}€
                                                            </span>
                                                        </div>
                                                    </div>

                                                    {/* MODEL 111 - RETENCIONS A TERCERS */}
                                                    <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                                        <h4 className="text-xs font-bold text-blue-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                                                            <span className="w-2 h-2 rounded-full bg-blue-500"></span> Model 111
                                                        </h4>
                                                        <p className="text-xs text-blue-800 mb-4 leading-relaxed">
                                                            Diners que has retingut a altres professionals en les teves despeses.
                                                        </p>
                                                        <div className="pt-2 border-t border-blue-200 mt-auto">
                                                            <span className="text-sm font-bold text-blue-900 block mb-1">A ingressar:</span>
                                                            <span className="block text-right font-bold font-mono text-xl text-blue-700">
                                                                {fiscalData[q].irpf111_A_Pagar.toFixed(2)}€
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BOTÓ I GIDGET CALCULADORA */}
                    <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2 no-print">
                        <CalculatorWidget isOpen={showCalculator} onClose={() => setShowCalculator(false)} />
                        
                        {/* Botó "XL" més gran i amb icona més evident */}
                        <button 
                            onClick={() => setShowCalculator(!showCalculator)}
                            className={`h-20 w-20 flex items-center justify-center rounded-full shadow-2xl transition-all transform hover:scale-105 active:scale-95 ${showCalculator ? 'bg-slate-700 text-white rotate-45' : 'bg-slate-800 text-white'}`}
                            title={showCalculator ? "Tancar Calculadora" : "Obrir Calculadora"}
                        >
                            {showCalculator ? <IconPlus size={32} /> : <IconCalc size={32} />}
                        </button>
                    </div>

                    <footer className="text-center p-6 text-slate-400 text-sm mt-8 border-t border-slate-200 no-print">
                        <p>Fet per a FET DE FILS. Les dades es guarden al navegador d'aquest ordinador.</p>
                        <Gobo26Footer />
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
